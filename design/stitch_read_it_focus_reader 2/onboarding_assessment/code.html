<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Read-It | Reading Level Assessment</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Newsreader:ital,wght@0,400;0,600;0,700;1,700&amp;display=swap" rel="stylesheet"/>
<!-- Material Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#31302e",
                        "primary-fixed-dim": "#8ad3d7",
                        "on-tertiary-fixed-variant": "#604100",
                        "on-primary-fixed-variant": "#004f53",
                        "on-secondary-fixed-variant": "#852300",
                        "error-container": "#ffdad6",
                        "outline-variant": "#bec8c9",
                        "secondary": "#ac3509",
                        "on-secondary": "#ffffff",
                        "primary": "#00464a",
                        "tertiary": "#563a00",
                        "tertiary-container": "#744f00",
                        "on-background": "#1c1c1a",
                        "on-surface-variant": "#3f4949",
                        "secondary-container": "#fe6f42",
                        "tertiary-fixed-dim": "#ffba38",
                        "inverse-primary": "#8ad3d7",
                        "on-primary-container": "#8fd8dc",
                        "surface-container-high": "#eae8e4",
                        "surface-bright": "#fcf9f5",
                        "secondary-fixed": "#ffdbd0",
                        "on-primary-fixed": "#002021",
                        "surface-dim": "#dcdad6",
                        "surface": "#fcf9f5",
                        "on-primary": "#ffffff",
                        "on-surface": "#1c1c1a",
                        "surface-variant": "#e5e2de",
                        "on-tertiary": "#ffffff",
                        "primary-container": "#006064",
                        "primary-fixed": "#a6eff3",
                        "on-error": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#f3f0ec",
                        "error": "#ba1a1a",
                        "surface-tint": "#14696d",
                        "background": "#fcf9f5",
                        "surface-container-low": "#f6f3ef",
                        "surface-container-highest": "#e5e2de",
                        "surface-container": "#f0ede9",
                        "tertiary-fixed": "#ffdeac",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#ffb59f",
                        "on-tertiary-fixed": "#281900",
                        "on-secondary-fixed": "#3a0a00",
                        "on-tertiary-container": "#ffc155",
                        "on-secondary-container": "#631800",
                        "outline": "#6f7979"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Newsreader"],
                        "body": ["Newsreader"],
                        "label": ["Inter"]
                    }
                },
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-shadow {
            box-shadow: 0 16px 32px -4px rgba(28, 28, 26, 0.06);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-tertiary-fixed-dim/30">
<!-- TopAppBar Shell (Suppressed Nav, Show Logo Only for Context) -->
<header class="flex justify-between items-center w-full px-6 py-8 md:px-12 sticky top-0 z-50 bg-gradient-to-b from-[#fcf9f5] to-transparent">
<div class="font-headline font-bold text-primary dark:text-cyan-500 italic text-2xl tracking-tight">Read-It</div>
<div class="hidden md:block">
<span class="font-label text-xs uppercase tracking-[0.2em] text-on-surface-variant font-semibold">Step 02 / 04</span>
</div>
</header>
<main class="min-h-screen flex flex-col items-center justify-center px-6 pb-24">
<!-- Editorial Headline Section -->
<div class="max-w-3xl w-full mb-12 md:mb-16">
<h1 class="font-headline text-4xl md:text-5xl font-semibold text-primary tracking-tight leading-tight mb-4 text-left md:text-center">
                How fast do you read?
            </h1>
<p class="font-headline text-lg md:text-xl text-on-surface-variant italic text-left md:text-center opacity-80">
                Select a level to set your initial pace.
            </p>
</div>
<!-- Bento Selection Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-4xl">
<!-- Card 1: Beginner -->
<button class="group text-left flex flex-col p-8 rounded-xl bg-surface-container-low hover:bg-surface-container-lowest transition-all duration-300 editorial-shadow">
<div class="flex items-center justify-between mb-6">
<div class="p-3 rounded-full bg-[#00464a]/5 text-[#00464a] transition-colors group-hover:bg-[#00464a]/10">
<span class="material-symbols-outlined text-3xl" data-icon="potted_plant">potted_plant</span>
</div>
<span class="font-label text-[10px] font-bold uppercase tracking-widest text-[#00464a]/60">Level 01</span>
</div>
<h3 class="font-headline text-2xl font-semibold mb-2">Beginner</h3>
<p class="font-label text-xs font-medium text-primary mb-4 tracking-wide">50-150 WPM</p>
<p class="font-body text-on-surface-variant text-base leading-relaxed opacity-70">Focusing on comprehension and steady word absorption. Perfect for deep study.</p>
</button>
<!-- Card 2: Intermediate -->
<button class="group text-left flex flex-col p-8 rounded-xl bg-surface-container-low hover:bg-surface-container-lowest transition-all duration-300 editorial-shadow">
<div class="flex items-center justify-between mb-6">
<div class="p-3 rounded-full bg-primary/5 text-primary transition-colors group-hover:bg-primary/10">
<span class="material-symbols-outlined text-3xl" data-icon="menu_book">menu_book</span>
</div>
<span class="font-label text-[10px] font-bold uppercase tracking-widest text-primary/60">Level 02</span>
</div>
<h3 class="font-headline text-2xl font-semibold mb-2">Intermediate</h3>
<p class="font-label text-xs font-medium text-primary mb-4 tracking-wide">150-250 WPM</p>
<p class="font-body text-on-surface-variant text-base leading-relaxed opacity-70">The standard conversational pace. Ideal for fiction and general non-fiction enjoyment.</p>
</button>
<!-- Card 3: Advanced -->
<button class="group text-left flex flex-col p-8 rounded-xl bg-surface-container-low hover:bg-surface-container-lowest transition-all duration-300 editorial-shadow">
<div class="flex items-center justify-between mb-6">
<div class="p-3 rounded-full bg-secondary/5 text-secondary transition-colors group-hover:bg-secondary/10">
<span class="material-symbols-outlined text-3xl" data-icon="rocket_launch">rocket_launch</span>
</div>
<span class="font-label text-[10px] font-bold uppercase tracking-widest text-secondary/60">Level 03</span>
</div>
<h3 class="font-headline text-2xl font-semibold mb-2">Advanced</h3>
<p class="font-label text-xs font-medium text-secondary mb-4 tracking-wide">250-350 WPM</p>
<p class="font-body text-on-surface-variant text-base leading-relaxed opacity-70">A swift, active reading style. For those who process information rapidly and effectively.</p>
</button>
<!-- Card 4: Expert -->
<button class="group text-left flex flex-col p-8 rounded-xl bg-surface-container-low hover:bg-surface-container-lowest transition-all duration-300 editorial-shadow">
<div class="flex items-center justify-between mb-6">
<div class="p-3 rounded-full bg-tertiary/5 text-tertiary transition-colors group-hover:bg-tertiary/10">
<span class="material-symbols-outlined text-3xl" data-icon="bolt">bolt</span>
</div>
<span class="font-label text-[10px] font-bold uppercase tracking-widest text-tertiary/60">Level 04</span>
</div>
<h3 class="font-headline text-2xl font-semibold mb-2">Expert</h3>
<p class="font-label text-xs font-medium text-tertiary mb-4 tracking-wide">350-500 WPM</p>
<p class="font-body text-on-surface-variant text-base leading-relaxed opacity-70">High-speed scanning and retention. For the seasoned bibliophile and speed-reader.</p>
</button>
</div>
<!-- Actions -->
<div class="mt-12 flex flex-col items-center gap-6">
<button class="px-10 py-4 bg-gradient-to-br from-primary to-primary-container text-white rounded-full font-label font-semibold text-sm uppercase tracking-widest transition-transform hover:scale-[1.02] active:scale-95">
                Continue Journey
            </button>
<a class="font-label text-[10px] uppercase tracking-[0.2em] font-bold text-on-surface-variant hover:text-primary transition-colors" href="#">
                I'll customize later
            </a>
</div>
</main>
<!-- Side Content Decor (Editorial Aesthetic) -->
<div class="fixed left-0 top-1/2 -translate-y-1/2 -rotate-90 hidden xl:block origin-left pointer-events-none">
<span class="font-label text-[10px] uppercase tracking-[0.4em] text-on-surface-variant/30 font-bold whitespace-nowrap">The Modern Bibliophile / Onboarding</span>
</div>
<div class="fixed bottom-12 right-12 hidden lg:block w-48 opacity-20">
<div class="h-[1px] bg-on-surface-variant w-full mb-4"></div>
<p class="font-body italic text-sm leading-snug">"Reading is to the mind what exercise is to the body." — Joseph Addison</p>
</div>
<!-- Background Layering -->
<div class="fixed inset-0 -z-10 bg-surface">
<div class="absolute top-0 right-0 w-1/3 h-screen bg-surface-container-low opacity-50 clip-path-[polygon(100%_0,0%_0,100%_100%)]"></div>
</div>
</body></html>
