<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;0,700;1,400;1,700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-surface": "#31302e",
                    "primary-fixed-dim": "#8ad3d7",
                    "on-tertiary-fixed-variant": "#604100",
                    "on-primary-fixed-variant": "#004f53",
                    "on-secondary-fixed-variant": "#852300",
                    "error-container": "#ffdad6",
                    "outline-variant": "#bec8c9",
                    "secondary": "#ac3509",
                    "on-secondary": "#ffffff",
                    "primary": "#00464a",
                    "tertiary": "#563a00",
                    "tertiary-container": "#744f00",
                    "on-background": "#1c1c1a",
                    "on-surface-variant": "#3f4949",
                    "secondary-container": "#fe6f42",
                    "tertiary-fixed-dim": "#ffba38",
                    "inverse-primary": "#8ad3d7",
                    "on-primary-container": "#8fd8dc",
                    "surface-container-high": "#eae8e4",
                    "surface-bright": "#fcf9f5",
                    "secondary-fixed": "#ffdbd0",
                    "on-primary-fixed": "#002021",
                    "surface-dim": "#dcdad6",
                    "surface": "#fcf9f5",
                    "on-primary": "#ffffff",
                    "on-surface": "#1c1c1a",
                    "surface-variant": "#e5e2de",
                    "on-tertiary": "#ffffff",
                    "primary-container": "#006064",
                    "primary-fixed": "#a6eff3",
                    "on-error": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "inverse-on-surface": "#f3f0ec",
                    "error": "#ba1a1a",
                    "surface-tint": "#14696d",
                    "background": "#fcf9f5",
                    "surface-container-low": "#f6f3ef",
                    "surface-container-highest": "#e5e2de",
                    "surface-container": "#f0ede9",
                    "tertiary-fixed": "#ffdeac",
                    "on-error-container": "#93000a",
                    "secondary-fixed-dim": "#ffb59f",
                    "on-tertiary-fixed": "#281900",
                    "on-secondary-fixed": "#3a0a00",
                    "on-tertiary-container": "#ffc155",
                    "on-secondary-container": "#631800",
                    "outline": "#6f7979"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Newsreader", "serif"],
                    "body": ["Newsreader", "serif"],
                    "label": ["Inter", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-shadow {
            box-shadow: 0 16px 32px -4px rgba(28, 28, 26, 0.06);
        }
        body {
            background-color: #fcf9f5; /* Explicit warm off-white from instructions */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface font-body min-h-screen flex flex-col items-center">
<!-- Top Navigation (Suppressed per Shell Logic - Onboarding is transactional) -->
<main class="w-full max-w-2xl px-6 py-12 md:py-24 flex flex-col items-center justify-center space-y-12">
<!-- Progress Indicator -->
<nav class="flex space-x-3 mb-4">
<div class="h-1.5 w-8 rounded-full bg-surface-container-highest"></div>
<div class="h-1.5 w-8 rounded-full bg-surface-container-highest"></div>
<div class="h-1.5 w-12 rounded-full bg-primary shadow-sm"></div>
</nav>
<!-- Editorial Content Area -->
<header class="w-full text-center space-y-4">
<h1 class="font-headline font-semibold text-4xl md:text-5xl text-primary leading-tight tracking-tight px-4">
                Import your first PDF to start reading
            </h1>
<p class="font-body text-lg text-on-surface-variant max-w-md mx-auto">
                Transform any document into a beautiful, focused reading experience.
            </p>
</header>
<!-- Large Drop Zone / Interactive Card -->
<section class="w-full aspect-[4/3] md:aspect-[16/10] bg-surface-container-low rounded-xl relative group overflow-hidden flex flex-col items-center justify-center border-2 border-dashed border-outline-variant/30 hover:border-primary/20 transition-all duration-300 cursor-pointer">
<!-- Background Texture Image (Decorative) -->
<div class="absolute inset-0 opacity-40 mix-blend-multiply pointer-events-none">
<img alt="Abstract paper texture" class="w-full h-full object-cover" data-alt="Soft close-up of high-quality cream paper texture with subtle natural fibers and warm diffused lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDaL77XC_MCbVYhrLzE9kV1D9MCf0wREJPzfDqpIIMoKXABTNVqT6Ddk2YCTHSscAH1C-L4dhRSfsFNsl-GFe1hrnPGa_Sbk7dlcvCWnWKoer9z7y7c82u3DphEkZoBt-2LfvNejUIyu47nwxYa19XLWGeAYkWAVU56nj91UdSLmGSpJJE4NW6ixWsJVSyuUuHuUYx6DQaO3iL52Lwy7W6JCH6RwDZ8ChR7M-Z4I6xqbi-LzOl48DHAV2Avpt4cgrVQpNsNZ1hOG2s"/>
</div>
<!-- Content -->
<div class="relative z-10 flex flex-col items-center space-y-6">
<div class="w-24 h-24 rounded-full bg-surface-container-lowest editorial-shadow flex items-center justify-center text-primary-container scale-100 group-hover:scale-110 transition-transform duration-500">
<span class="material-symbols-outlined text-5xl" data-icon="upload">upload</span>
</div>
<div class="text-center">
<p class="font-label text-sm font-medium text-primary uppercase tracking-[0.2em]">
                        Drop files here
                    </p>
<p class="font-body text-on-surface-variant mt-2 italic">
                        Supports PDF, EPUB, and Text
                    </p>
</div>
</div>
<!-- Interactive Highlight for Glass Effect -->
<div class="absolute bottom-6 right-6 flex items-center space-x-2 bg-surface-container-lowest/80 backdrop-blur-md px-4 py-2 rounded-full editorial-shadow">
<span class="material-symbols-outlined text-secondary text-sm" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="font-label text-[10px] font-semibold uppercase tracking-widest text-on-surface-variant">OCR Enhanced</span>
</div>
</section>
<!-- CTA Cluster -->
<footer class="w-full flex flex-col items-center space-y-6">
<!-- Primary Button: Filling the primary-to-primary-container gradient mandate -->
<button class="w-full max-w-sm py-5 px-8 rounded-xl bg-gradient-to-br from-primary to-primary-container text-on-primary font-label font-semibold text-sm uppercase tracking-widest transition-all duration-300 active:scale-95 editorial-shadow flex items-center justify-center space-x-3">
<span class="material-symbols-outlined text-lg" data-icon="folder_open">folder_open</span>
<span>Choose from Files</span>
</button>
<!-- Secondary Button: surface-container-high tonal look -->
<button class="w-full max-w-sm py-4 px-8 rounded-xl bg-surface-container-high text-primary font-label font-semibold text-sm uppercase tracking-widest transition-all duration-300 hover:bg-surface-container-highest active:scale-95 flex items-center justify-center space-x-3">
<span>Try with sample text</span>
</button>
<!-- Tertiary / Link -->
<button class="font-label text-xs text-on-surface-variant uppercase tracking-[0.15em] opacity-60 hover:opacity-100 transition-opacity">
                Skip for now
            </button>
</footer>
</main>
<!-- Contextual "Streak" Glow (Custom Component Hint) -->
<div class="fixed bottom-12 right-12 hidden lg:flex items-center space-x-4 p-4 rounded-xl bg-surface-container-lowest editorial-shadow">
<div class="w-10 h-10 rounded-full bg-tertiary-container flex items-center justify-center shadow-[0_0_12px_rgba(116,79,0,0.1)]">
<span class="material-symbols-outlined text-tertiary-fixed-dim" data-icon="auto_stories" style="font-variation-settings: 'FILL' 1;">auto_stories</span>
</div>
<div class="flex flex-col">
<span class="font-label text-[10px] font-bold text-tertiary uppercase tracking-tighter">Your Journey</span>
<span class="font-body text-sm text-on-surface-variant italic leading-none">0 pages read</span>
</div>
</div>
</body></html>
