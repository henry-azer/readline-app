name: readline_app
description: "Readline — PDF English Reading Practice"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  # State & Reactivity
  rxdart: ^0.28.0
  # DI
  get_it: ^9.2.1
  # Routing
  go_router: ^17.2.0
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  # PDF
  syncfusion_flutter_pdf: ^29.1.38
  syncfusion_flutter_pdfviewer: ^29.1.38
  # File handling
  file_picker: ^8.1.6
  path_provider: ^2.1.5
  permission_handler: ^11.4.0
  # Charts
  fl_chart: ^0.70.2
  # UI
  google_fonts: ^8.0.2
  # Celebrations
  confetti: ^0.7.0
  # Sharing
  share_plus: ^10.1.4
  # Networking
  http: ^1.2.2
  # Text-to-Speech
  flutter_tts: ^4.2.0
  # URL launching & platform info
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.3
  device_info_plus: ^11.2.1
  in_app_review: ^2.0.9
  # Utils
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^3.2.5
  json_serializable: ^6.9.4
  # hive_generator removed — incompatible with freezed ^3.x (source_gen conflict)
  # Hive adapters are written manually using toMap/fromMap

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/lang/
    - assets/sample/
