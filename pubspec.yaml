name: read_it
description: Modern PDF English Reading Practice App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management & Dependency Injection
  provider: ^6.1.1
  get_it: ^7.6.4

  # Database & Storage
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2

  # PDF Processing
  pdf: ^3.10.7
  syncfusion_flutter_pdfviewer: ^23.2.6

  # UI Components & Theming
  cupertino_icons: ^1.0.6
  material_color_utilities: ^0.8.0

  # File Management
  file_picker: ^6.1.1
  permission_handler: ^11.1.0

  # Analytics & Performance
  shared_preferences: ^2.2.2
  device_info_plus: ^9.1.1

  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.1
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mockito: ^5.4.4
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
