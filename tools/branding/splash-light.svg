<?xml version="1.0" encoding="UTF-8"?>
<!--
  Launch splash content (light) — designed to match SplashScreen widget exactly.
  Coords are @2x of logical pts (so a 480×368 PNG = 240×184 logical points).
  Layout mirrors lib/features/splash/screens/splash_screen.dart:
    - SplashBookMark (Icon size 80) — book mark, primary gradient
    - SizedBox(AppSpacing.xl = 24)
    - SplashBrandTitle "READ-IT" — Newsreader italic 800, 40pt, letter-spacing 4 (editorial), height 1.2, color = lightPrimary
    - SizedBox(AppSpacing.xs = 8)
    - SplashTagline "READ AT YOUR PACE" — Inter 600, 12pt, letter-spacing 2 (wide), color = lightOnSurfaceVariant
  Background is transparent; LaunchBackground colorset paints the surface.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 368" width="480" height="368">
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00464A"/>
      <stop offset="100%" stop-color="#006064"/>
    </linearGradient>
  </defs>

  <!-- Book mark: 160×160 (= 80pt logical), centered, top at y=20 -->
  <svg x="160" y="20" width="160" height="160" viewBox="0 0 512 512">
    <g transform="translate(0,512) scale(1,-1)">
      <path fill="url(#ink)" d="M387 483 302 398C300 396 299 393 299 390V216C299 207 310 202 316 208L402 285C404 287 405 290 405 293V476C405 485 394 490 387 483ZM479 401C469 406 459 410 448 414V157C424 166 399 171 373 171C333 171 293 159 256 137V395C221 415 182 427 139 427C100 427 64 417 33 401C26 398 21 390 21 382V125C21 108 39 98 53 106C79 119 108 128 139 128C183 128 224 111 256 85C288 111 329 128 373 128C404 128 433 119 459 106C473 98 491 108 491 124V382C491 390 486 398 479 401Z"/>
    </g>
  </svg>

  <!-- Wordmark "READ-IT": Newsreader italic 800, 80px (= 40pt logical), letter-spacing 8 (= 4pt logical) -->
  <text x="240" y="296"
        text-anchor="middle"
        font-family="'Newsreader', 'Charter', 'Georgia', 'Times New Roman', serif"
        font-style="italic"
        font-weight="800"
        font-size="80"
        letter-spacing="8"
        fill="#00464A">READ-IT</text>

  <!-- Tagline "READ AT YOUR PACE": Inter 600, 24px (= 12pt logical), letter-spacing 4 (= 2pt logical) -->
  <text x="240" y="354"
        text-anchor="middle"
        font-family="'Inter', 'Helvetica Neue', 'Helvetica', 'Arial', sans-serif"
        font-weight="600"
        font-size="24"
        letter-spacing="4"
        fill="#49454F">READ AT YOUR PACE</text>
</svg>
