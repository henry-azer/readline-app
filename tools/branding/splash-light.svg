<?xml version="1.0" encoding="UTF-8"?>
<!--
  Launch splash content (light) — must mirror SplashScreen exactly.
  Canvas is 480×368 px = 240×184 logical points (@2x).
  Layout matches lib/features/splash/screens/splash_screen.dart:
    - SplashBookMark (Icon size 80) — Icons.auto_stories_rounded, primary gradient
    - SizedBox(AppSpacing.xl = 24)
    - SplashBrandTitle "Readline" — Newsreader italic 700, 40pt, height 1.2, color = lightPrimary
    - SizedBox(AppSpacing.xs = 8)
    - SplashTagline "Focus. Read. Grow." — Inter 600, 12pt, letter-spacing 2 (wide),
      color = lightOnSurfaceVariant
  Background is transparent; the storyboard's LaunchBackground colorset paints the surface.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 368" width="480" height="368">
  <defs>
    <!-- AppGradients.primary(light): lightPrimary → lightPrimaryContainer at 135° -->
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00464A"/>
      <stop offset="100%" stop-color="#006064"/>
    </linearGradient>
  </defs>

  <!-- Book mark: 160×160 px (= 80pt logical), centered horizontally, top at y=20.
       Based on the Material Symbols Rounded `auto_stories` glyph but with
       the left-page outline subpath dropped so both pages render solid
       (viewBox 0 -960 960 960, the modern Material Symbols coordinate system). -->
  <svg x="160" y="20" width="160" height="160" viewBox="0 -960 960 960">
    <path fill="url(#ink)" d="M458.5-181q-10.5-3-19.5-8-41-25-86-38t-93-13q-42 0-82.5 11T100-198q-21 11-40.5-1T40-234v-482q0-11 5.5-21T62-752q46-24 96-36t102-12q58 0 113.5 15T480-740v484q51-32 107-48t113-16q36 0 70.5 6t69.5 18v-480q15 5 29.5 10.5T898-752q11 5 16.5 15t5.5 21v482q0 23-19.5 35t-40.5 1q-37-20-77.5-31T700-240q-48 0-93 13t-86 38q-9 5-19.5 8t-21.5 3q-11 0-21.5-3ZM593-390q-10 9-21.5 3.5T560-405v-327q0-4 1.5-7.5t4.5-6.5l160-160q10-10 22-5t12 19v343q0 5-2 8.5t-5 6.5L593-390Z"/>
  </svg>

  <!-- Wordmark "Readline": Newsreader italic 700, 80px (= 40pt logical), no extra tracking -->
  <text x="240" y="296"
        text-anchor="middle"
        font-family="'Newsreader 16pt', 'Newsreader', 'Charter', 'Georgia', 'Times New Roman', serif"
        font-style="italic"
        font-weight="700"
        font-size="80"
        fill="#00464A">Readline</text>

  <!-- Tagline "Focus. Read. Grow.": Inter 600, 24px (= 12pt logical), letter-spacing 4 (= 2pt logical) -->
  <text x="240" y="354"
        text-anchor="middle"
        font-family="'Inter', 'Helvetica Neue', 'Helvetica', 'Arial', sans-serif"
        font-weight="600"
        font-size="24"
        letter-spacing="4"
        fill="#49454F">Focus. Read. Grow.</text>
</svg>
